<div class="container card center">
  <div id="games"></div>
</div>

<script>
fetch("games.json")
.then(r=>r.json())
.then(data=>{
  const el=document.getElementById("games");
  el.innerHTML=data.map(g=>`
    <div class="badge ${g.status}">
      <a href="${g.stream}">🎮</a>
      <a href="${g.download}">⬇️</a>
      ${g.name}
    </div>
  `).join("");
});
</script>
